syntax = "proto3";

package dispatcher;

option go_package = "dispatcher/proto";

// Worker calling Dispatcher
message RegisterAvailableRequest {
  string worker_id = 1;
  string address = 2;
  string model_id = 3;
  int32 available_slots = 4;
}

message RegisterAvailableResponse {
  bool accepted = 1;
}

// Dispatcher calling Worker
message PushJobRequest {
  string job_id = 1;
  string prompt = 2;
  string priority = 3;
}

message PushJobResponse {
  bool accepted = 1;
}

message HealthCheckRequest {
  string worker_id = 1;
}

message HealthCheckResponse {
  bool alive = 1;
  string model_id = 2;
  int32 available_slots = 3;
}

// Dispatcher implements this — worker calls in
service DispatcherService {
  rpc RegisterAvailable(RegisterAvailableRequest) returns (RegisterAvailableResponse);
}

// Worker implements this — dispatcher calls in
service WorkerService {
  rpc PushJob(PushJobRequest) returns (PushJobResponse);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}