apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-workers
  labels:
    component: worker
spec:
  replicas: 4 # Number of parallel worker containers you want running
  selector:
    matchLabels:
      app: agent-worker
  template:
    metadata:
      labels:
        app: agent-worker
    spec:
      containers:
      - name: worker
        image: local/agent-inference:latest
        imagePullPolicy: Never # Forces K8s to use your local built image
        env:
        - name: DISPATCHER_URL
          value: "192.168.0.60:50051"
        resources:
          requests:
            memory: "128Mi"  # Low baseline allocation per worker
            cpu: "150m"      # 15% of a single CPU core
          limits:
            memory: "256Mi"  # Strict ceiling (container restarts if it hits this)
            cpu: "300m"      # 30% CPU cap max per worker